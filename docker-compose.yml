services:
  db:
    image: postgres:16-alpine
    container_name: xuitter-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xuitter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - xuitter_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xuitter"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: dev
    container_name: xuitter-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/generated
    command: npm run dev

volumes:
  xuitter_pgdata: